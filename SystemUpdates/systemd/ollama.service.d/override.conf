[Service]
# Open WebUI runs in a Podman container and reaches Ollama through the host
# bridge. Firewalld must continue to block direct LAN/Internet access to 11434.
Environment="OLLAMA_HOST=0.0.0.0:11434"

# Sensible limits for a CPU-only, quad-core server serving one or two people.
Environment="OLLAMA_NUM_PARALLEL=1"
Environment="OLLAMA_MAX_LOADED_MODELS=1"

# Optional: uncomment to disable Ollama cloud models and web-search features.
# Environment="OLLAMA_NO_CLOUD=1"

# Optional: uncomment to reserve some CPU capacity for the operating system.
# CPUQuota=350%
